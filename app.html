<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baghpat Services</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#8a6f28;--gold4:rgba(201,168,76,0.12);
  --bg:#0d0c09;--bg2:#121009;--bg3:#181510;
  --text:#f0ede6;--text2:#b8b0a0;--text3:#7a7060;
}
html,body{height:100%;background:var(--bg);overflow:hidden;}

/* BACKGROUND */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.12) 0%,transparent 60%),
             radial-gradient(ellipse at 0% 100%,rgba(26,58,107,.15) 0%,transparent 50%),
             radial-gradient(ellipse at 100% 100%,rgba(201,168,76,.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* GRID LINES */
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 20px;
}

/* TOP SITES */
.top-sites{
  display:flex;gap:12px;margin-bottom:28px;
  animation:fadeDown .6s ease both;
}
.site-chip{
  display:flex;align-items:center;gap:7px;
  background:rgba(201,168,76,.07);
  border:1px solid rgba(201,168,76,.2);
  border-radius:30px;padding:6px 14px 6px 8px;
  text-decoration:none;transition:all .25s;
}
.site-chip:hover{background:rgba(201,168,76,.14);border-color:var(--gold3);transform:translateY(-1px);}
.site-chip-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.site-chip-name{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.5px;}

/* LOGO */
.logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:32px;
  animation:fadeUp .7s ease .1s both;
}
.logo-icon{
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,#1e1a10,#2a2210);
  border:1px solid var(--gold3);
  display:flex;align-items:center;justify-content:center;
  font-size:2.6rem;margin-bottom:14px;
  box-shadow:0 0 40px rgba(201,168,76,.2),0 8px 32px rgba(0,0,0,.6);
  position:relative;overflow:hidden;
}
.logo-icon::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 40% 35%,rgba(201,168,76,.15),transparent 60%);
}
.logo-title{
  font-family:'Cinzel',serif;
  font-size:1.55rem;font-weight:900;
  color:var(--gold);letter-spacing:4px;
  text-align:center;line-height:1.2;
  text-shadow:0 0 30px rgba(201,168,76,.3);
}
.logo-sub{
  font-family:'Rajdhani',sans-serif;
  font-size:.72rem;color:var(--text3);
  letter-spacing:3px;text-transform:uppercase;
  margin-top:5px;
}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:10px;
  width:100%;max-width:320px;margin-bottom:28px;
  animation:fadeUp .7s ease .2s both;
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
.divider-text{font-family:'Rajdhani',sans-serif;font-size:.6rem;color:var(--text3);letter-spacing:2px;}

/* BUTTONS */
.btns{
  display:flex;flex-direction:column;gap:12px;
  width:100%;max-width:320px;
}

.btn-main{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;border-radius:14px;
  text-decoration:none;border:none;cursor:pointer;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.btn-main::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .25s;
}
.btn-main:hover{transform:translateY(-2px) scale(1.01);}
.btn-main:hover::before{opacity:1;}
.btn-main:active{transform:translateY(0) scale(.99);}

.btn-customer{
  background:linear-gradient(135deg,#1e1a10,#2a2210);
  border:1px solid var(--gold3);
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.05);
  animation:fadeUp .7s ease .3s both;
}
.btn-customer::before{background:linear-gradient(135deg,rgba(201,168,76,.08),transparent);}
.btn-customer:hover{border-color:var(--gold);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 20px rgba(201,168,76,.15);}

.btn-provider{
  background:linear-gradient(135deg,#0d1a2e,#0a1520);
  border:1px solid rgba(26,58,107,.6);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  animation:fadeUp .7s ease .4s both;
}
.btn-provider::before{background:linear-gradient(135deg,rgba(26,58,107,.15),transparent);}
.btn-provider:hover{border-color:rgba(77,126,247,.5);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 20px rgba(26,58,107,.2);}

.btn-ic{
  width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.btn-customer .btn-ic{background:linear-gradient(135deg,var(--gold),var(--gold3));}
.btn-provider .btn-ic{background:linear-gradient(135deg,#1a3a6b,#0d1a3a);border:1px solid rgba(77,126,247,.3);}

.btn-text{flex:1;}
.btn-label{
  font-family:'Cinzel',serif;
  font-size:.82rem;font-weight:700;letter-spacing:1px;
  margin-bottom:2px;
}
.btn-customer .btn-label{color:var(--gold);}
.btn-provider .btn-label{color:#7ab3f7;}
.btn-desc{
  font-family:'Rajdhani',sans-serif;
  font-size:.65rem;color:var(--text3);letter-spacing:.3px;
}
.btn-arrow{
  font-size:1rem;flex-shrink:0;
  transition:transform .25s;
}
.btn-main:hover .btn-arrow{transform:translateX(3px);}
.btn-customer .btn-arrow{color:var(--gold3);}
.btn-provider .btn-arrow{color:rgba(77,126,247,.6);}

/* FOOTER */
.footer{
  margin-top:28px;
  font-family:'Rajdhani',sans-serif;
  font-size:.6rem;color:var(--text3);
  letter-spacing:1px;text-align:center;
  animation:fadeUp .7s ease .5s both;
}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP PARTNER SITES -->
  <div class="top-sites">
    <a class="site-chip" href="https://digitalmenu61.netlify.app/" target="_blank">
      <div class="site-chip-ic" style="background:linear-gradient(135deg,#c9a84c,#8a6f28)">🍽️</div>
      <span class="site-chip-name">MENU PRO</span>
    </a>
    <a class="site-chip" href="https://digital-shokeen.netlify.app/" target="_blank">
      <div class="site-chip-ic" style="background:linear-gradient(135deg,#1a3a6b,#0d1a3a);border:1px solid rgba(77,126,247,.3)">⚡</div>
      <span class="site-chip-name">SHOKEEN</span>
    </a>
  </div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-icon">🏛️</div>
    <div class="logo-title">BAGHPAT<br>SERVICES</div>
    <div class="logo-sub">Your City · Your Services</div>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">ENTER AS</div>
    <div class="divider-line"></div>
  </div>

  <!-- BUTTONS -->
  <div class="btns">
    <a class="btn-main btn-customer" href="index.html">
      <div class="btn-ic">🛒</div>
      <div class="btn-text">
        <div class="btn-label">CUSTOMER</div>
        <div class="btn-desc">Services book karo · Nearby providers dekho</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>
    <a class="btn-main btn-provider" href="provider.html">
      <div class="btn-ic">🔧</div>
      <div class="btn-text">
        <div class="btn-label">SERVICE PROVIDER</div>
        <div class="btn-desc">Login · Register · Apna business manage karo</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>
  </div>

  <!-- FOOTER -->
  <div class="footer">BAGHPAT · UTTAR PRADESH · INDIA</div>

</div>
</body>
</html>
