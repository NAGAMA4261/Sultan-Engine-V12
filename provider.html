}

function sendRegOTP(){
  const name=document.getElementById('r_name')?.value.trim();
  const phone=document.getElementById('r_phone')?.value.trim();
  const cat=document.getElementById('r_cat')?.value;
  const city=document.getElementById('r_city')?.value.trim();
  const area=document.getElementById('r_area')?.value.trim();
  if(!_payMode){T('Payment method select karo — UPI ya Cash','err');return}
  if(_payMode==='upi'){
    const utr=document.getElementById('r_utr')?.value.trim();
    if(!utr||utr.length<8){T('UTR/Transaction ID daalo','err');return}
  }
  if(!name||name.length<2){T('Business name daalo','err');return}
  if(!/^[6-9]\d{9}$/.test(phone)){T('Valid phone number daalo','err');return}
  if(!cat){T('Category select karo','err');return}
  if(!city){T('City daalo','err');return}
  if(!area){T('Area daalo','err');return}
  if(!P.db){T('Firebase not connected','err');return}
  P.db.ref('/businesses').orderByChild('phone').equalTo(phone).once('value',snap=>{
    if(snap.val()){T('Is number se pehle se account hai. Login karo.','err');switchAuthTab('login');return}
    _regData={name,phone,whatsapp:document.getElementById('r_wa')?.value.trim()||phone,category:cat,city,area,services:document.getElementById('r_services')?.value.trim()||'',status:'pending',createdAt:Date.now(),rating:0,ratingCount:0,paymentMode:_payMode,paymentUTR:_payMode==='upi'?(document.getElementById('r_utr')?.value.trim()||''):'cash_pending',registrationFee:199};
    _fireRegOTP(phone);
  });
}

function _fireRegOTP(phone){
  const btn=document.getElementById('regOtpBtn');
  if(btn){btn.textContent='Sending...';btn.disabled=true;}
  try{
    if(_regRcv){_regRcv.clear();_regRcv=null;}
    _regRcv=new firebase.auth.RecaptchaVerifier('recaptcha-container-reg',{size:'invisible'});
    P.auth.signInWithPhoneNumber('+91'+phone,_regRcv)
      .then(res=>{
        _regConfirmRes=res;
        document.getElementById('rs1').style.display='none';
        document.getElementById('rs2').style.display='block';
        const el=document.getElementById('regOtpSentTo');if(el)el.textContent='+91-'+phone;
        T('📱 OTP bheja gaya','suc');
      })
      .catch(err=>{T('OTP fail: '+err.message,'err');if(_regRcv){_regRcv.clear();_regRcv=null;}if(btn){btn.textContent='VERIFY PHONE & REGISTER →';btn.disabled=false;}});
  }catch(e){T('Error: '+e.message,'err');if(btn){btn.textContent='VERIFY PHONE & REGISTER →';btn.disabled=false;}}
}

function verifyRegOTP(){
  const otp=document.getElementById('r_otp')?.value.trim();
  if(!otp||otp.length!==6){T('6-digit OTP daalo','err');return}
  if(!_regConfirmRes){T('Pehle OTP mangao','err');return}
  const btn=document.getElementById('regVerifyBtn');
  if(btn){btn.textContent='Submitting...';btn.disabled=true;}
  _regConfirmRes.confirm(otp)
    .then(()=>{
      const newId='biz_'+Date.now();
      P.db.ref('/businesses/'+newId).set(_regData)
        .then(()=>{
          document.getElementById('registerPanel').innerHTML=`<div style="text-align:center;padding:20px 0"><div style="font-size:2.5rem;margin-bottom:10px">🎉</div><div style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);margin-bottom:8px">REGISTRATION SUBMITTED!</div><div style="font-size:.72rem;color:var(--text3);line-height:1.8">Admin 24 ghante mein verify karega.<br>Approve hone ke baad login kar paoge.</div></div>`;
          T('✅ Registration submitted! Admin verify karega.','suc');
        })
        .catch(e=>T('Error: '+e.message,'err'));
    })
    .catch(()=>{T('❌ Galat OTP ya expire ho gaya','err');if(btn){btn.textContent='CONFIRM & SUBMIT →';btn.disabled=false;}});
}

function resetRegFlow(){

  document.getElementById('rs2').style.display='none';
  const btn=document.getElementById('regOtpBtn');if(btn){btn.textContent='VERIFY PHONE & REGISTER →';btn.disabled=false;}
}

let _rcv=null,_confirmRes=null;

function sendOTP(){
  const phone=document.getElementById('l_phone')?.value.trim();
  if(!/^[6-9]\d{9}$/.test(phone)){T('Valid 10-digit phone daalo','err');return}
  if(!P.db||!P.auth){T('Firebase not connected','err');return}
  P.db.ref('/businesses').orderByChild('phone').equalTo(phone).once('value',snap=>{
    const val=snap.val();
    if(!val){T('Is number se koi business registered nahi hai','err');return}
    const [bid,biz]=Object.entries(val)[0];
    if(biz.status==='pending'){T('Account approval pending hai','wrn');return}
    P._loginBid=bid;P._loginBiz=biz;P._loginPhone=phone;
    _fireOTP(phone);
  });
}

function _fireOTP(phone){
  const btn=document.getElementById('otpBtn');
  if(btn){btn.textContent='Sending...';btn.disabled=true;}
  try{
    if(_rcv){_rcv.clear();_rcv=null;}
    _rcv=new firebase.auth.RecaptchaVerifier('recaptcha-container',{size:'invisible'});
    P.auth.signInWithPhoneNumber('+91'+phone,_rcv)
      .then(res=>{
        _confirmRes=res;
        document.getElementById('ls1').style.display='none';
        document.getElementById('ls2').style.display='block';
        const el=document.getElementById('otpSentTo');if(el)el.textContent='+91-'+phone;
        T('📱 OTP bheja gaya +91-'+phone,'suc');
      })
      .catch(err=>{
        T('OTP fail: '+err.message,'err');
        if(_rcv){_rcv.clear();_rcv=null;}
        if(btn){btn.textContent='GET OTP →';btn.disabled=false;}
      });
  }catch(e){
    T('Error: '+e.message,'err');
    if(btn){btn.textContent='GET OTP →';btn.disabled=false;}
  }
}

function resendOTP(){
  if(!P._loginPhone){T('Pehle number daalo','err');return}
  document.getElementById('ls1').style.display='block';
  document.getElementById('ls2').style.display='none';
  _fireOTP(P._loginPhone);
}

function resetOTPFlow(){
  if(_rcv){_rcv.clear();_rcv=null;}
  _confirmRes=null;
  document.getElementById('ls1').style.display='block';
  document.getElementById('ls2').style.display='none';
}

function verifyOTP(){
  const entered=document.getElementById('l_otp')?.value.trim();
  if(!entered||entered.length!==6){T('6-digit OTP daalo','err');return}
  if(!_confirmRes){T('Pehle OTP mangao','err');return}
  const btn=document.getElementById('verifyBtn');
  if(btn){btn.textContent='Verifying...';btn.disabled=true;}
  _confirmRes.confirm(entered)
    .then(()=>{
      P.provider={id:P._loginBid,...P._loginBiz};P.bid=P._loginBid;
      _lsSet('sultan_prov_v2',{bid:P._loginBid,phone:P._loginPhone});
      startSession();T('✅ Login successful!','suc');
    })
    .catch(()=>{
      T('❌ Galat OTP ya expire ho gaya','err');
      if(btn){btn.textContent='VERIFY & LOGIN →';btn.disabled=false;}
    });
}

function startSession(){
  document.getElementById('bot-nav').style.display='flex';
  updateStatusDot();
  listenAll();
  showTab('bookings',document.querySelector('.nav-it'));
}

function listenAll(){
  if(!P.db||!P.bid)return;
  P.db.ref('/bookings').orderByChild('bizId').equalTo(P.bid).on('value',snap=>{
    P.bookings={};
    if(snap.val())Object.entries(snap.val()).forEach(([k,v])=>{if(v.bizId===P.bid)P.bookings[k]=v;});
    updateBkBadge();
    if(P.currentTab==='bookings')renderBookings();
  });
  P.db.ref('/wallets/'+P.bid).on('value',snap=>{P.wallet=snap.val()||{balance:50,transactions:[]};});
  P.db.ref('/chats').on('value',snap=>{
    P.chats={};
    const all=snap.val()||{};
    Object.entries(all).forEach(([k,v])=>{if(v.bizId===P.bid)P.chats[k]=v;});
    updateChatBadge();
    if(P.currentTab==='chat'&&P.activeChatKey)renderChatWindow(P.activeChatKey);
    else if(P.currentTab==='chat')renderChatList();
  });
  P.db.ref('/businesses/'+P.bid).on('value',snap=>{if(snap.val()){P.provider={id:P.bid,...snap.val()};updateStatusDot();}});
}

function updateStatusDot(){
  const b=P.provider;if(!b)return;
  const dot=document.getElementById('statusDot');const lbl=document.getElementById('statusLabel');
  if(b.status==='open'){dot.style.background='#43a047';dot.style.boxShadow='0 0 8px #43a047';lbl.textContent='Online';}
  else if(b.status==='busy'){dot.style.background='var(--orange)';dot.style.boxShadow='0 0 8px var(--orange)';lbl.textContent='Busy';}
  else{dot.style.background='var(--text4)';dot.style.boxShadow='none';lbl.textContent='Offline';}
}

function updateBkBadge(){
  const n=Object.values(P.bookings).filter(b=>b.status==='pending').length;
  const badge=document.getElementById('bkBadge');
  if(n>0){badge.style.display='flex';badge.textContent=n;}else badge.style.display='none';
}

function updateChatBadge(){
  let unread=0;
  Object.entries(P.chats).forEach(([k,chat])=>{
    const lastRead=_lsGet('prov_chat_read_'+k,0);
    Object.values(chat.messages||{}).forEach(m=>{if(m.sender==='customer'&&m.ts>lastRead)unread++;});
  });
  const badge=document.getElementById('chatBadge');
  if(unread>0){badge.style.display='flex';badge.textContent=unread;}else badge.style.display='none';
}

function showTab(tab,btn){
  P.currentTab=tab;
  document.querySelectorAll('.nav-it').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(tab==='bookings')renderBookings();
  else if(tab==='chat'){P.activeChatKey=null;renderChatList();}
  else if(tab==='earnings')renderEarnings();
  else if(tab==='schedule')renderSchedule();

function confirmBooking(id){
  if(!P.db)return;
  P.db.ref('/bookings/'+id).update({status:'confirmed',confirmedAt:Date.now()}).then(()=>{T('✅ Booking confirmed!','suc');});
}

function rejectBooking(id){
  if(!P.db)return;
  P.db.ref('/bookings/'+id).update({status:'cancelled',cancelledAt:Date.now()}).then(()=>{T('Booking rejected','wrn');});
}

function completeBooking(id){
  if(!P.db)return;
  const bk=P.bookings[id];
  // Add commission to revenue tracking
  P.db.ref('/bookings/'+id).update({status:'completed',completedAt:Date.now()});
  P.db.ref('/wallets/'+P.bid).transaction(w=>{
    const base=w||{balance:0,transactions:[]};
    const txns=(base.transactions||[]);
    txns.push({desc:'Job completed - '+((bk?.services||[]).map(s=>s.name).join(', ')||'Service'),amount:CFG.commission,date:Date.now()});
    return{...base,balance:(base.balance||0)+CFG.commission,transactions:txns};
  });
  P.db.ref('/businesses/'+P.bid+'/leadsCompleted').transaction(v=>(v||0)+1);
  T('✅ Job completed! Commission credited.','suc');
}

    </div>`;
}

function toggleDay(d,el){
  if(!P._schedDays)P._schedDays=[];
  if(P._schedDays.includes(d)){P._schedDays=P._schedDays.filter(x=>x!==d);el.style.background='var(--bg3)';el.style.border='1px solid var(--border2)';el.style.color='var(--text3)';}
  else{P._schedDays.push(d);el.style.background='var(--gold)';el.style.border='none';el.style.color='var(--bg)';}
}

function toggleSlot(s,el){
  if(!P._schedSlots)P._schedSlots=[];
  if(P._schedSlots.includes(s)){P._schedSlots=P._schedSlots.filter(x=>x!==s);el.className='slot-item';el.querySelector('.slot-status').textContent='Unavailable';}
  else{P._schedSlots.push(s);el.className='slot-item avail';el.querySelector('.slot-status').textContent='Available';}
}

function saveSchedule(){
  const maxPerDay=parseInt(document.getElementById('maxBk')?.value)||3;
  const services=document.getElementById('servicesText')?.value.trim()||'';
  const sched={days:P._schedDays||[],slots:P._schedSlots||[],maxPerDay};
  P.schedule=sched;_lsSet('sultan_sched_'+P.bid,sched);
  if(P.db){
    P.db.ref('/businesses/'+P.bid+'/schedule').set(sched);
    P.db.ref('/businesses/'+P.bid+'/services').set(services);
  }
  if(P.provider)P.provider.services=services;
  T('✅ Schedule & services saved!','suc');
}

/* ─── TRACK ─── */
function renderTrack(){
  document.getElementById('appContent').innerHTML=`
    <div class="dash-header"><div class="dh-name">📍 LIVE TRACKING</div><div class="dh-meta">Share location with customers</div></div>
    <div style="padding:14px">
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:12px">
        <div style="font-size:.72rem;color:var(--text2);font-weight:700;margin-bottom:9px">📡 GPS Sharing</div>
        <button class="track-tgl${P.trackOn?' on':''}" id="trackBtn" onclick="toggleTracking()">${P.trackOn?'📍 Tracking ON — Tap to Stop':'📍 Start Live Tracking'}</button>
        <div id="trackCoords" style="font-size:.63rem;color:var(--text3);margin-top:8px;line-height:1.7;background:var(--bg4);padding:7px 10px;border-radius:4px;display:${P.trackOn?'block':'none'}">Waiting for GPS...</div>
      </div>
      <div id="provMapContainer" style="display:${P.trackOn?'block':'none'};margin-bottom:12px">
        <div id="provTrackMap" style="width:100%;height:220px;border-radius:var(--r);border:1px solid var(--border2);overflow:hidden;background:var(--bg3)"></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;font-size:.68rem;color:var(--text3);line-height:1.9">
        • Job jaane se pehle ON karo<br>• Customer ko real-time location milegi<br>• Kaam ke baad OFF karo
      </div>
    </div>`;
  if(P.trackOn)_initProvMap();
}

function toggleTracking(){
  if(P.trackOn){
    if(P.trackWid)navigator.geolocation.clearWatch(P.trackWid);
    P.trackOn=false;
    if(P.db&&P.bid)P.db.ref('/tracking/'+P.bid+'/active').set(false);
    document.getElementById('trackBtn').className='track-tgl';
    document.getElementById('trackBtn').textContent='📍 Start Live Tracking';
    document.getElementById('trackCoords').style.display='none';
    const mc=document.getElementById('provMapContainer');if(mc)mc.style.display='none';
    _provMap=null;_provMarker=null;
    T('Tracking stopped','wrn');
  }else{
    if(!navigator.geolocation){T('GPS supported nahi hai','err');return}
    P.trackOn=true;
    document.getElementById('trackBtn').className='track-tgl on';
    document.getElementById('trackBtn').textContent='📍 Tracking ON — Tap to Stop';
    const mc=document.getElementById('provMapContainer');if(mc)mc.style.display='block';
    _initProvMap();
    P.trackWid=navigator.geolocation.watchPosition(pos=>{
      const d={lat:pos.coords.latitude,lng:pos.coords.longitude,updatedAt:Date.now(),active:true,providerName:P.provider?.name||''};
      if(P.db&&P.bid)P.db.ref('/tracking/'+P.bid).set(d);
      const coords=document.getElementById('trackCoords');
      if(coords){coords.style.display='block';coords.innerHTML=`🕒 ${new Date().toLocaleTimeString()}<br>📍 Lat: ${d.lat.toFixed(5)}, Lng: ${d.lng.toFixed(5)}`;}
      _updateProvMap(d.lat,d.lng);
    },()=>T('GPS error','err'),{enableHighAccuracy:true});
    T('📍 Live tracking started','suc');
  }
}

function _initProvMap(){
  _loadMapsAPI(()=>{
    const el=document.getElementById('provTrackMap');
    if(!el||_provMap)return;
    _provMap=new google.maps.Map(el,{center:{lat:28.6139,lng:77.2090},zoom:15,styles:_darkMapStyle,disableDefaultUI:true,zoomControl:true});
    _provMarker=new google.maps.Marker({map:_provMap,icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#c9a84c',fillOpacity:1,strokeColor:'#1a3a6b',strokeWeight:2},title:P.provider?.name||'You'});
    navigator.geolocation.getCurrentPosition(pos=>{
      const latlng={lat:pos.coords.latitude,lng:pos.coords.longitude};
      _provMap.setCenter(latlng);_provMarker.setPosition(latlng);
    },()=>{});
  });
}

function _updateProvMap(lat,lng){
  if(!_provMap||!_provMarker)return;
  const pos={lat:parseFloat(lat),lng:parseFloat(lng)};
  _provMarker.setPosition(pos);_provMap.panTo(pos);
}

function saveProfile(){
  if(!P.db)return;
  const updates={name:document.getElementById('p_name')?.value.trim(),whatsapp:document.getElementById('p_wa')?.value.trim(),city:document.getElementById('p_city')?.value.trim(),area:document.getElementById('p_area')?.value.trim(),staff:document.getElementById('p_staff')?.value.trim()};
  if(!updates.name){T('Business name daalo','err');return}
  P.db.ref('/businesses/'+P.bid).update(updates).then(()=>{Object.assign(P.provider,updates);T('✅ Profile saved!','suc');}).catch(e=>T('Error: '+e.message,'err'));
}

function logout(){
  const oldBid=P.bid;
  P.provider=null;P.bid=null;P.wallet={balance:50,transactions:[]};P.bookings={};P.chats={};
  localStorage.removeItem('sultan_prov_v2');
  if(P.db&&oldBid){
    P.db.ref('/bookings').off();
    P.db.ref('/chats').off();
    P.db.ref('/wallets/'+oldBid).off();
    P.db.ref('/businesses/'+oldBid).off();
  }
  showLogin();T('Logged out','wrn');
}

function openRecharge(){

function submitRecharge(){
  const amt=parseInt(document.getElementById('rch_amt')?.value)||0;
  const txn=document.getElementById('rch_txn')?.value.trim();
  if(amt<50||amt>5000){T('Amount ₹50 se ₹5000 ke beech hona chahiye','err');return}
  if(!txn||txn.length<12){T('Valid UTR daalo (min 12 characters)','err');return}
  const rid='RQ'+Date.now();
  if(P.db)P.db.ref('/wallets/'+P.bid+'/rechargeRequests/'+rid).set({bizId:P.bid,bizName:P.provider?.name||'',amount:amt,txnId:txn,status:'pending',createdAt:Date.now()}).then(()=>{closeModal('rechargeModal');T('💰 Request submitted! Admin verify karega.','suc');}).catch(e=>T('Error: '+e.message,'err'));
}
