<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#E8380D">
<title>Sultan Engine — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#E8380D;--brand-dark:#B52A08;--brand-light:#FFF1EE;
  --ink:#1A1410;--ink2:#4A3C35;--muted:#9A8880;
  --border:#EDE8E5;--surface:#FFFFFF;--bg:#F7F3F1;
  --green:#1A6B44;--green-bg:#E6F4EC;
  --amber:#C47400;--amber-bg:#FEF5E4;
  --blue:#1A56DB;--blue-bg:#E8F0FE;
  --red-bg:#FEE8E8;--red-text:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',sans-serif;background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
button{font-family:'Sora',sans-serif;cursor:pointer;border:none;background:none;outline:none}
input,textarea,select{font-family:'Sora',sans-serif;outline:none;border:none}
::-webkit-scrollbar{width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:700;color:var(--ink);flex:1}
.topbar-badge{font-size:11px;background:var(--brand-light);color:var(--brand);padding:4px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
#main{padding-bottom:80px;min-height:100vh}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:28px 24px}
.login-icon{width:64px;height:64px;background:var(--brand-light);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:800;color:var(--ink);text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:22px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--ink2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;font-size:14px;font-family:'Sora',sans-serif;color:var(--ink);transition:border-color .15s}
.fi:focus{border-color:var(--brand)}.fi::placeholder{color:var(--muted)}
select.fi{appearance:none}textarea.fi{resize:none}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn-primary{width:100%;background:var(--brand);color:#fff;border-radius:12px;padding:13px;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;margin-top:6px}
.btn-primary:active{background:var(--brand-dark);transform:scale(.98)}
.btn-sm{padding:7px 11px;border-radius:9px;font-size:11px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;border:none;white-space:nowrap}
.btn-sm:active{transform:scale(.95)}
.bg{background:var(--green-bg);color:var(--green)}
.br{background:var(--red-bg);color:var(--red-text)}
.bb{background:var(--blue-bg);color:var(--blue)}
.ba{background:var(--amber-bg);color:var(--amber)}
.bx{background:var(--bg);border:1.5px solid var(--border);color:var(--ink2)}
.btn-danger{width:100%;background:var(--red-bg);color:var(--red-text);border:1.5px solid #FABDBD;border-radius:12px;padding:13px;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;margin-top:8px}
.tab-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:50px;padding:9px 2px 11px;text-align:center;cursor:pointer;border:none;background:none;font-family:'Sora',sans-serif;position:relative;flex-shrink:0}
.tab-icon{font-size:18px;display:block}
.tab-label{font-size:9px;color:var(--muted);display:block;margin-top:2px;font-weight:600}
.tab-item.active .tab-label{color:var(--brand)}
.tab-notif{position:absolute;top:6px;right:calc(50% - 16px);background:var(--brand);color:#fff;font-size:8px;font-weight:800;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-n{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.alert-card{border-radius:12px;padding:12px 14px;margin:10px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.alert-amber{background:var(--amber-bg);border:1px solid #F5D98A}
.alert-brand{background:var(--brand-light);border:1px solid rgba(232,56,13,.2)}
.alert-red{background:var(--red-bg);border:1px solid #FABDBD}
.alert-text{font-size:12px;font-weight:600;color:var(--ink2);flex:1;line-height:1.4}
.alert-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;border:none}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.qa-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 12px;text-align:left;cursor:pointer;transition:all .15s}
.qa-btn:active{border-color:var(--brand);transform:scale(.97)}
.qa-icon{font-size:20px;margin-bottom:6px;display:block}
.qa-label{font-size:12px;font-weight:700;color:var(--ink)}
.qa-sub{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.card.warn{border-color:rgba(232,56,13,.25)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px}
.card-av{width:42px;height:42px;border-radius:12px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-title{font-size:14px;font-weight:700;color:var(--ink)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.card-meta{font-size:12px;color:var(--ink2);line-height:1.8;margin-bottom:9px}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:3px 8px;border-radius:7px;font-weight:700;white-space:nowrap}
.b-pending{background:var(--amber-bg);color:var(--amber)}
.b-active{background:var(--green-bg);color:var(--green)}
.b-rejected{background:var(--red-bg);color:var(--red-text)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-purple{background:#F3E8FF;color:#7C3AED}
.search-wrap{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:90}
.search-rel{position:relative}
.search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-in{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:9px 13px 9px 34px;font-size:13px;font-family:'Sora',sans-serif;color:var(--ink);outline:none}
.search-in:focus{border-color:var(--brand)}
.pills{display:flex;gap:6px;overflow-x:auto;padding:9px 16px;-ms-overflow-style:none;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.pills::-webkit-scrollbar{display:none}
.pill{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Sora',sans-serif}
.pill.active{background:var(--brand-light);border-color:rgba(232,56,13,.3);color:var(--brand)}
.pill:active{transform:scale(.95)}
.info-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:2px 14px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border:none}
.info-label{color:var(--muted);font-size:12px;flex-shrink:0}
.info-val{color:var(--ink);font-weight:600;text-align:right;max-width:65%;word-break:break-all}
.wal-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.wal-row:last-child{border:none}
.rch-card{background:var(--surface);border:1.5px solid rgba(232,56,13,.2);border-radius:14px;padding:13px;margin-bottom:9px}
.chat-item{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:11px}
.chat-item:active{border-color:var(--brand)}
.chat-av{width:40px;height:40px;border-radius:11px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.msg{max-width:80%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word;margin-bottom:6px}
.msg-out{background:var(--brand);color:#fff;align-self:flex-end;border-radius:12px 12px 3px 12px}
.msg-in{background:var(--bg);border:1px solid var(--border);color:var(--ink);align-self:flex-start;border-radius:12px 12px 12px 3px}
.msg-time{font-size:10px;margin-top:3px;opacity:.65;text-align:right}
.msg-in .msg-time{text-align:left}
.promo-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.promo-code{font-size:16px;font-weight:800;color:var(--brand);letter-spacing:2px}
.notif-item{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:14px 0}
.section-title{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.section-wrap{padding:14px 16px}
.code-box{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:11px;color:var(--ink2);font-family:monospace;white-space:pre-wrap;overflow-x:auto;line-height:1.7;margin-bottom:10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border:none}
.toggle-label{font-size:13px;font-weight:600;color:var(--ink)}
.tgl{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--brand)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{transform:translateX(20px)}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:6px}
.chart-bar{flex:1;background:var(--brand-light);border-radius:5px 5px 0 0;position:relative;min-width:0;cursor:pointer;transition:background .15s}
.chart-bar:hover{background:var(--brand)}
.chart-labels{display:flex;gap:6px}
.chart-label{flex:1;font-size:9px;color:var(--muted);text-align:center}
.sheet-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-ov.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 36px;z-index:301;transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.sheet-ov.open .sheet{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:16px;letter-spacing:-.3px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:40px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;font-family:'Sora',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:42px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600;color:var(--ink2)}
.empty-sub{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- SHEETS -->
<div class="sheet-ov" id="editBizSheet" onclick="if(event.target===this)closeSheet('editBizSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="editBizBody"></div></div></div>
<div class="sheet-ov" id="addBizSheet" onclick="if(event.target===this)closeSheet('addBizSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="addBizBody"></div></div></div>
<div class="sheet-ov" id="walletSheet" onclick="if(event.target===this)closeSheet('walletSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="walletSheetBody"></div></div></div>
<div class="sheet-ov" id="auditSheet" onclick="if(event.target===this)closeSheet('auditSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="auditSheetBody"></div></div></div>
<div class="sheet-ov" id="chatViewSheet" onclick="if(event.target===this)closeSheet('chatViewSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="chatViewBody"></div></div></div>
<div class="sheet-ov" id="addPromoSheet" onclick="if(event.target===this)closeSheet('addPromoSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="addPromoBody"></div></div></div>
<div class="sheet-ov" id="sendNotifSheet" onclick="if(event.target===this)closeSheet('sendNotifSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="sendNotifBody"></div></div></div>
<div class="sheet-ov" id="bizDetailSheet" onclick="if(event.target===this)closeSheet('bizDetailSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="bizDetailBody"></div></div></div>
<div class="sheet-ov" id="custDetailSheet" onclick="if(event.target===this)closeSheet('custDetailSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="custDetailBody"></div></div></div>
<div class="sheet-ov" id="bkDetailSheet" onclick="if(event.target===this)closeSheet('bkDetailSheet')"><div class="sheet"><div class="sheet-handle"></div><div id="bkDetailBody"></div></div></div>

<div id="main"><div id="appContent"></div></div>

<div id="tabBar" style="display:none">
  <div class="tab-bar">
    <button class="tab-item active" onclick="showSection('overview',this)"><span class="tab-icon">📊</span><span class="tab-label">Overview</span></button>
    <button class="tab-item" onclick="showSection('businesses',this)"><span class="tab-icon">🏪</span><span class="tab-label">Businesses</span><span class="tab-notif" id="pendingBadge" style="display:none">0</span></button>
    <button class="tab-item" onclick="showSection('bookings',this)"><span class="tab-icon">📋</span><span class="tab-label">Bookings</span></button>
    <button class="tab-item" onclick="showSection('wallets',this)"><span class="tab-icon">💰</span><span class="tab-label">Wallets</span><span class="tab-notif" id="rchBadge" style="display:none">0</span></button>
    <button class="tab-item" onclick="showSection('customers',this)"><span class="tab-icon">👥</span><span class="tab-label">Customers</span></button>
    <button class="tab-item" onclick="showSection('complaints',this)"><span class="tab-icon">⚠️</span><span class="tab-label">Issues</span><span class="tab-notif" id="compBadge" style="display:none">0</span></button>
    <button class="tab-item" onclick="showSection('chats',this)"><span class="tab-icon">💬</span><span class="tab-label">Chats</span></button>
    <button class="tab-item" onclick="showSection('promos',this)"><span class="tab-icon">🎁</span><span class="tab-label">Promos</span></button>
    <button class="tab-item" onclick="showSection('notifications',this)"><span class="tab-icon">🔔</span><span class="tab-label">Notify</span></button>
    <button class="tab-item" onclick="showSection('settings',this)"><span class="tab-icon">⚙️</span><span class="tab-label">Settings</span></button>
  </div>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyBfVLRSr-kwW0P17Jh0yPkIuLBw8PJg8iQ",authDomain:"sultan-engine-v12-62455.firebaseapp.com",databaseURL:"https://sultan-engine-v12-62455-default-rtdb.firebaseio.com",projectId:"sultan-engine-v12-62455",storageBucket:"sultan-engine-v12-62455.firebasestorage.app",messagingSenderId:"1015551535579",appId:"1:1015551535579:web:08e3ae1e2ab88fa9891ffe"};
const ADMIN_PASS='Sultan786';
const CFG={leadPrice:10,upiId:'8273214261@ptyes',currency:'₹',commission:10};
const CATS={barber:'✂️ Barber',doctor:'🏥 Doctor',electrician:'⚡ Electrician',cab:'🚕 Cab',restaurant:'🍛 Restaurant',shop:'🛍️ Shop',plumber:'🔧 Plumber',others:'➕ Others'};
const A={db:null,loggedIn:false,biz:{},wallets:{},complaints:{},bookings:{},chats:{},customers:{},promos:{},notifications:{},settings:{},auditLogs:{},currentSection:'overview',bizSearch:'',bizFilter:'all',bkFilter:'all',custSearch:''};

function _lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function _lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function tsAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}
let _tt=null;
function T(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3200);}
function openSheet(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeSheet(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}

function initFB(){
  const load=(src,cb)=>{const s=document.createElement('script');s.src=src;s.onload=cb;s.onerror=()=>checkSession();document.head.appendChild(s);};
  load('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',()=>
    load('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js',()=>
      load('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js',()=>{
        try{firebase.initializeApp(FB_CFG);A.db=firebase.database();A.auth=firebase.auth();A.auth.signInAnonymously().catch(()=>{});}catch(e){}
        checkSession();
      })
    )
  );
}

function checkSession(){
  const s=_lsGet('sultan_admin_v3',null);
  if(s&&s.auth&&Date.now()-s.ts<604800000){A.loggedIn=true;startSession();}else showLogin();
}

function showLogin(){
  document.getElementById('tabBar').style.display='none';
  document.getElementById('appContent').innerHTML=`<div id="loginWrap"><div class="login-card"><div class="login-icon">👑</div><div class="login-title">Admin Login</div><div class="login-sub">Sultan Engine Control Panel</div><div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="a_pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn-primary" onclick="doLogin()">Login →</button></div></div>`;
}

function doLogin(){
  if(document.getElementById('a_pass')?.value===ADMIN_PASS){A.loggedIn=true;_lsSet('sultan_admin_v3',{auth:true,ts:Date.now()});startSession();}else T('❌ Wrong password');
}

function doLogout(){A.loggedIn=false;localStorage.removeItem('sultan_admin_v3');showLogin();T('Logged out');}

function startSession(){
  document.getElementById('tabBar').style.display='block';
  listenAll();
  showSection('overview',document.querySelector('.tab-item'));
}

function listenAll(){
  if(!A.db)return;
  A.db.ref('/businesses').on('value',snap=>{A.biz=snap.val()||{};updateBadges();if(A.currentSection==='businesses')renderBiz();if(A.currentSection==='overview')renderOverview();});
  A.db.ref('/wallets').on('value',snap=>{A.wallets=snap.val()||{};updateBadges();if(A.currentSection==='wallets')renderWallets();});
  A.db.ref('/complaints').on('value',snap=>{A.complaints=snap.val()||{};updateBadges();if(A.currentSection==='complaints')renderComplaints();});
  A.db.ref('/bookings').on('value',snap=>{A.bookings=snap.val()||{};if(A.currentSection==='bookings')renderBookings();if(A.currentSection==='overview')renderOverview();});
  A.db.ref('/chats').on('value',snap=>{A.chats=snap.val()||{};if(A.currentSection==='chats')renderChats();});
  A.db.ref('/customers').on('value',snap=>{A.customers=snap.val()||{};if(A.currentSection==='customers')renderCustomers();});
  A.db.ref('/settings/promoCodes').on('value',snap=>{A.promos=snap.val()||{};if(A.currentSection==='promos')renderPromos();});
  A.db.ref('/notifications').on('value',snap=>{A.notifications=snap.val()||{};if(A.currentSection==='notifications')renderNotifications();});
  A.db.ref('/settings').on('value',snap=>{if(snap.val())A.settings=snap.val();});
  A.db.ref('/auditLogs').on('value',snap=>{A.auditLogs=snap.val()||{};});

function updateBadges(){

function showSection(sec,btn){
  A.currentSection=sec;

function renderOverview(){
  const bArr=Object.values(A.biz),bkArr=Object.values(A.bookings);

  const completed=bkArr.filter(b=>b.status==='completed').length;
  const revenue=completed*CFG.commission;
  const walletPool=Object.values(A.wallets).reduce((s,w)=>s+(w.balance||0),0);
  const pendingRch=Object.values(A.wallets).reduce((s,w)=>s+Object.values(w.rechargeRequests||{}).filter(r=>r.status==='pending').length,0);

      <div class="stat-card"><div class="stat-n">${custSet.size}</div><div class="stat-l">Customers</div></div>
      <div class="stat-card"><div class="stat-n" style="color:var(--blue)">${CFG.currency}${walletPool}</div><div class="stat-l">Wallet Pool</div></div>
    </div>
    ${pending>0?`<div class="alert-card alert-amber"><div class="alert-text">🔔 ${pending} businesses pending approval</div><button class="alert-btn" style="background:var(--amber);color:#fff" onclick="showSection('businesses',document.querySelectorAll('.tab-item')[1])">Review</button></div>`:''}
    ${pendingRch>0?`<div class="alert-card alert-brand"><div class="alert-text">💰 ${pendingRch} recharge requests pending</div><button class="alert-btn" style="background:var(--brand);color:#fff" onclick="showSection('wallets',document.querySelectorAll('.tab-item')[3])">Review</button></div>`:''}
    ${openC>0?`<div class="alert-card alert-red"><div class="alert-text">⚠️ ${openC} open complaints</div><button class="alert-btn" style="background:var(--red-text);color:#fff" onclick="showSection('complaints',document.querySelectorAll('.tab-item')[5])">View</button></div>`:''}
    <div class="section-wrap">
      <div class="section-title">Revenue — Last 7 Days</div>
      <div style="margin-bottom:16px">
        <div class="chart-bars">${dayRev.map(v=>`<div class="chart-bar" style="height:${Math.max(6,Math.round((v/maxRev)*72))}px"><div style="position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap">${v>0?'₹'+v:''}</div></div>`).join('')}</div>

}

          <div class="card-actions">

function approveBiz(id){
  if(!A.db)return;
  A.db.ref('/businesses/'+id).update({status:'open',approvedAt:Date.now()}).then(()=>{
    A.db.ref('/wallets/'+id).transaction(w=>{if(w)return w;return{balance:50,transactions:[{desc:'Welcome bonus',amount:50,date:Date.now()}]};});
    T('✅ Approved!');audit('APPROVE_BIZ',A.biz[id]?.name||id);
  });
}
function rejectBiz(id){if(!confirm('Reject?'))return;if(!A.db)return;A.db.ref('/businesses/'+id).update({status:'rejected'}).then(()=>{T('Rejected');audit('REJECT_BIZ',id);});}
function deleteBiz(id,name){if(!confirm(`Delete "${name}"?`))return;if(!A.db)return;A.db.ref('/businesses/'+id).remove().then(()=>{T('Deleted');audit('DELETE_BIZ',name);});}
function toggleVerified(id,val){if(!A.db)return;A.db.ref('/businesses/'+id+'/verified').set(val).then(()=>{T(val?'✅ Verified':'Unverified');audit(val?'VERIFY':'UNVERIFY',id);});}
function toggleBoost(id,val){if(!A.db)return;A.db.ref('/businesses/'+id+'/boost').set(val).then(()=>{T(val?'⚡ Boosted!':'Boost removed');audit(val?'BOOST':'UNBOOST',id);});}
function toggleSuspend(id,val){if(!A.db)return;A.db.ref('/businesses/'+id+'/suspended').set(val).then(()=>{T(val?'🚫 Suspended':'✅ Unsuspended');audit(val?'SUSPEND':'UNSUSPEND',id);});}

function submitAddBiz(){
  const name=document.getElementById('ab_name').value.trim(),phone=document.getElementById('ab_phone').value.trim(),city=document.getElementById('ab_city').value.trim();
  if(!name||name.length<2){T('Business name daalo');return}
  if(!/^[6-9]\d{9}$/.test(phone)){T('Valid 10-digit phone daalo');return}
  if(!city){T('City daalo');return}
  const cat=document.getElementById('ab_cat').value;
  const avMap={barber:'✂️',doctor:'🏥',electrician:'⚡',cab:'🚕',restaurant:'🍛',shop:'🛍️',plumber:'🔧',others:'➕'};
  const data={name,category:cat,phone,whatsapp:phone,city,area:document.getElementById('ab_area').value.trim(),staff:document.getElementById('ab_staff').value.trim(),services:document.getElementById('ab_services').value.trim(),status:'open',verified:true,boost:false,suspended:false,rating:0,ratingCount:0,calls:0,leadsCompleted:0,avatar:avMap[cat]||'🏪',createdAt:Date.now()};
  if(!A.db){T('Firebase not connected');return}
  const bid='B'+Date.now();

function approveRecharge(bid,rid,amt,bizName){
  if(!A.db)return;
  A.db.ref('/wallets/'+bid).transaction(w=>{
    if(!w)return w;
    const txns=(w.transactions||[]);txns.push({desc:'Recharge approved by admin',amount:amt,date:Date.now()});
    const reqs=w.rechargeRequests||{};if(reqs[rid])reqs[rid].status='approved';
    return{...w,balance:(w.balance||0)+amt,transactions:txns,rechargeRequests:reqs};
  }).then(()=>{T(`✅ ₹${amt} credited to ${bizName}!`);audit('APPROVE_RECHARGE',bizName+' ₹'+amt);});
}
function rejectRecharge(bid,rid){if(!A.db)return;A.db.ref('/wallets/'+bid+'/rechargeRequests/'+rid+'/status').set('rejected').then(()=>T('Rejected'));}

function openWalletAdjust(bid,bizName){
  document.getElementById('walletSheetBody').innerHTML=`
    <div class="sheet-title">💰 Adjust Wallet</div>
    <div class="info-card" style="margin-bottom:14px">
      <div class="info-row"><span class="info-label">Business</span><span class="info-val">${esc(bizName)}</span></div>
      <div class="info-row"><span class="info-label">Current Balance</span><span class="info-val" style="color:var(--green);font-size:16px;font-weight:800">${CFG.currency}${A.wallets[bid]?.balance||0}</span></div>
    </div>
    <div class="fg"><label class="fl">Amount (+ add / - deduct)</label><input class="fi" id="wa_amt" type="number" placeholder="e.g. 100 or -50"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${[50,100,200,500,-10,-50].map(a=>`<button onclick="document.getElementById('wa_amt').value=${a}" style="background:var(--bg);border:1.5px solid var(--border);padding:6px 11px;border-radius:9px;font-size:11px;font-weight:700;color:${a>0?'var(--green)':'var(--red-text)'};font-family:'Sora',sans-serif;cursor:pointer">${a>0?'+':''}₹${Math.abs(a)}</button>`).join('')}</div>
    <div class="fg"><label class="fl">Reason</label><input class="fi" id="wa_reason" placeholder="Manual recharge, Refund, Bonus..."></div>
    <button class="btn-primary" onclick="submitWalletAdjust('${bid}','${esc(bizName)}')">Adjust Balance</button>`;
  openSheet('walletSheet');
}

function submitWalletAdjust(bid,bizName){
  const amt=parseInt(document.getElementById('wa_amt').value)||0;
  const reason=document.getElementById('wa_reason').value.trim()||'Admin adjustment';
  if(!amt){T('Amount daalo');return}
  if(!A.db)return;
  A.db.ref('/wallets/'+bid).transaction(w=>{
    const b=w||{balance:0,transactions:[]};
    b.transactions=(b.transactions||[]);b.transactions.push({desc:reason,amount:amt,date:Date.now()});b.balance=(b.balance||0)+amt;return b;
  }).then(()=>{closeSheet('walletSheet');T(`₹${Math.abs(amt)} ${amt>0?'added':'deducted'} — ${bizName}`);audit('WALLET_ADJUST',bizName+': '+(amt>0?'+':'')+amt);});
}

    <div class="topbar"><div class="topbar-title">🎁 Promo Codes</div><span class="topbar-badge">${promos.length} codes</span></div>
    <div style="padding:12px 16px">
      <button class="btn-sm bg" style="padding:10px 16px;margin-bottom:14px" onclick="openAddPromo()">+ Create Promo Code</button>
      ${promos.length?promos.map(([code,p])=>`
        <div class="promo-card">
          <div>
            <div class="promo-code">${esc(code)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">Discount: ${CFG.currency}${p.discount||0} · Used: ${p.usedCount||0}x${p.maxUse?' / '+p.maxUse:''}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${p.expiry?'Expires: '+fmtDate(p.expiry):'No expiry'} ${p.desc?'· '+esc(p.desc):''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <span class="badge ${p.active?'b-active':'b-rejected'}">${p.active?'ACTIVE':'OFF'}</span>
            <button class="btn-sm ${p.active?'br':'bg'}" onclick="togglePromo('${code}',${!p.active})">${p.active?'Deactivate':'Activate'}</button>
            <button class="btn-sm br" onclick="deletePromo('${code}')">🗑️</button>
          </div>
        </div>`).join(''):`<div class="empty-state"><div class="empty-icon">🎁</div><div class="empty-text">No promo codes</div><div class="empty-sub">Create one to offer discounts</div></div>`}
    </div>`;
}

function openAddPromo(){
  document.getElementById('addPromoBody').innerHTML=`
    <div class="sheet-title">🎁 Create Promo Code</div>
    <div class="fg"><label class="fl">Promo Code * (letters & numbers only)</label><input class="fi" id="pc_code" placeholder="e.g. SULTAN50" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"></div>
    <div class="frow"><div class="fg"><label class="fl">Discount (₹) *</label><input class="fi" id="pc_disc" type="number" placeholder="50" min="1"></div><div class="fg"><label class="fl">Max Uses (0 = unlimited)</label><input class="fi" id="pc_max" type="number" placeholder="0"></div></div>
    <div class="fg"><label class="fl">Expiry Date</label><input class="fi" id="pc_expiry" type="date"></div>
    <div class="fg"><label class="fl">Description</label><input class="fi" id="pc_desc" placeholder="New user discount..."></div>
    <button class="btn-primary" onclick="submitAddPromo()">Create Promo</button>`;
  openSheet('addPromoSheet');
}

function submitAddPromo(){
  const code=document.getElementById('pc_code')?.value.trim().toUpperCase();
  const disc=parseInt(document.getElementById('pc_disc')?.value)||0;
  if(!code||code.length<3){T('Promo code daalo (min 3 chars)');return}
  if(!disc){T('Discount amount daalo');return}
  const maxUse=parseInt(document.getElementById('pc_max')?.value)||null;
  const expiryStr=document.getElementById('pc_expiry')?.value;
  const expiry=expiryStr?new Date(expiryStr).getTime():null;
  const desc=document.getElementById('pc_desc')?.value.trim()||'';
  if(!A.db){T('Firebase not connected');return}
  A.db.ref('/settings/promoCodes/'+code).set({discount:disc,maxUse,expiry,desc,active:true,usedCount:0,createdAt:Date.now()}).then(()=>{closeSheet('addPromoSheet');T('✅ Promo created!');audit('CREATE_PROMO',code+' ₹'+disc);});
}
function togglePromo(code,val){if(!A.db)return;A.db.ref('/settings/promoCodes/'+code+'/active').set(val).then(()=>T(val?'✅ Activated':'Deactivated'));}
function deletePromo(code){if(!confirm(`Delete promo "${code}"?`))return;if(!A.db)return;A.db.ref('/settings/promoCodes/'+code).remove().then(()=>T('Deleted'));}

/* ── NOTIFICATIONS ── */
function renderNotifications(){
  const notifs=Object.entries(A.notifications||{}).sort((a,b)=>b[1].createdAt-a[1].createdAt);
  document.getElementById('appContent').innerHTML=`
    <div class="topbar"><div class="topbar-title">🔔 Notifications</div></div>
    <div style="padding:12px 16px">
      <button class="btn-sm bg" style="padding:10px 16px;margin-bottom:14px;width:100%" onclick="openSendNotif()">📢 Send Broadcast Message</button>
      <div class="section-title">Sent Notifications</div>
      ${notifs.length?notifs.map(([id,n])=>`
        <div class="notif-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <div style="font-size:13px;font-weight:700;color:var(--ink)">${esc(n.title||'')}</div>
            <span class="badge b-blue">${esc(n.target||'ALL')}</span>
          </div>
          <div style="font-size:13px;color:var(--ink2);line-height:1.5;margin-bottom:5px">${esc(n.body||'')}</div>
          <div style="font-size:11px;color:var(--muted)">${fmtDate(n.createdAt||0)} · ${esc(n.by||'Admin')}</div>
        </div>`).join(''):`<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">No notifications sent</div></div>`}
    </div>`;
}

function openSendNotif(){
  document.getElementById('sendNotifBody').innerHTML=`
    <div class="sheet-title">📢 Send Notification</div>
    <div class="fg"><label class="fl">Target Audience</label><select class="fi" id="notif_target"><option value="ALL">All Users</option><option value="PROVIDERS">All Providers</option><option value="CUSTOMERS">All Customers</option></select></div>
    <div class="fg"><label class="fl">Title *</label><input class="fi" id="notif_title" placeholder="e.g. Special Offer Today!"></div>
    <div class="fg"><label class="fl">Message *</label><textarea class="fi" id="notif_body" rows="3" placeholder="Write your message here..."></textarea></div>
    <button class="btn-primary" onclick="submitNotif()">Send Notification</button>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5">Notification saves to Firebase. Users see it next time they open the app.</div>`;
  openSheet('sendNotifSheet');
}

function submitNotif(){
  const title=document.getElementById('notif_title')?.value.trim();
  const body=document.getElementById('notif_body')?.value.trim();
  const target=document.getElementById('notif_target')?.value;
  if(!title){T('Title daalo');return}
  if(!body){T('Message daalo');return}
  if(!A.db)return;
  A.db.ref('/notifications').push({title,body,target,createdAt:Date.now(),by:'Sultan Admin'}).then(()=>{closeSheet('sendNotifSheet');T('✅ Notification sent!');audit('SEND_NOTIF',title+' → '+target);});
}

/* ── SETTINGS ── */
function renderSettings(){
  const s={...CFG,...A.settings};
  const rules=`{
  "rules": {
    "businesses": { ".read": true, "$b": { ".write": "auth != null" } },
    "leads": { ".read": true, ".write": true },
    "ratings": { ".read": true, ".write": true },
    "tracking": { ".read": true, ".write": true },
    "wallets": { ".read": "auth != null", ".write": "auth != null" },
    "settings": { ".read": true, ".write": "auth != null" },
    "complaints": { ".read": "auth != null", ".write": true },
    "bookings": { ".read": "auth != null", ".write": "auth != null" },
    "chats": { ".read": "auth != null", ".write": "auth != null" },
    "customers": { ".read": "auth != null", ".write": "auth != null" },
    "notifications": { ".read": true, ".write": "auth != null" },
    "auditLogs": { ".read": "auth != null", ".write": "auth != null" }
  }
}`;
  document.getElementById('appContent').innerHTML=`
    <div class="topbar"><div class="topbar-title">⚙️ Settings</div></div>
    <div style="padding:14px 16px 20px">
      <div class="section-title">Platform Config</div>
      <div class="info-card" style="padding:14px;margin-bottom:12px">
        <div class="fg"><label class="fl">Lead Price (₹)</label><input class="fi" id="s_lead" type="number" value="${s.leadPrice||10}"></div>
        <div class="fg"><label class="fl">Commission Per Booking (₹)</label><input class="fi" id="s_comm" type="number" value="${s.commission||10}"></div>
        <div class="fg"><label class="fl">UPI ID</label><input class="fi" id="s_upi" value="${esc(s.upiId||'')}"></div>
        <div class="fg"><label class="fl">Referral Bonus (₹)</label><input class="fi" id="s_ref" type="number" value="${s.referralBonus||20}"></div>
        <div class="fg"><label class="fl">Max Bookings Per Day (customer)</label><input class="fi" id="s_max" type="number" value="${s.maxLeadsPerDay||5}"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Nearby Radius (meters)</label><input class="fi" id="s_rad" type="number" value="${s.nearbyRadius||2000}"></div>
      </div>
      <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
      <div class="divider"></div>
      <div class="section-title">Feature Toggles</div>
      <div class="info-card" style="padding:4px 14px;margin-bottom:12px">
        <div class="toggle-row"><div><div class="toggle-label">Booking System</div><div style="font-size:11px;color:var(--muted)">Allow customers to book</div></div><div class="tgl${s.bookingEnabled!==false?' on':''}" onclick="toggleSetting('bookingEnabled',${s.bookingEnabled===false})"></div></div>
        <div class="toggle-row"><div><div class="toggle-label">Wallet Recharge</div><div style="font-size:11px;color:var(--muted)">Allow wallet top-ups</div></div><div class="tgl${s.walletEnabled!==false?' on':''}" onclick="toggleSetting('walletEnabled',${s.walletEnabled===false})"></div></div>
        <div class="toggle-row"><div><div class="toggle-label">New Registrations</div><div style="font-size:11px;color:var(--muted)">Allow new providers</div></div><div class="tgl${s.registrationEnabled!==false?' on':''}" onclick="toggleSetting('registrationEnabled',${s.registrationEnabled===false})"></div></div>
        <div class="toggle-row"><div><div class="toggle-label">Promo Codes</div><div style="font-size:11px;color:var(--muted)">Allow promo code usage</div></div><div class="tgl${s.promosEnabled!==false?' on':''}" onclick="toggleSetting('promosEnabled',${s.promosEnabled===false})"></div></div>
      </div>
      <div class="divider"></div>
      <div class="section-title">Firebase DB Rules</div>
      <div class="code-box">${rules}</div>
      <button class="btn-primary" style="background:var(--blue)" onclick="copyRules()">📋 Copy Rules</button>
      <div class="divider"></div>
      <div class="section-title">Admin Tools</div>
      <button class="btn-sm bx" style="width:100%;padding:12px;margin-bottom:8px" onclick="openAuditSheet()">📋 View Audit Log</button>
      <div class="divider"></div>
      <button class="btn-danger" onclick="doLogout()">🚪 Logout</button>
      <div style="text-align:center;padding:14px 0 0;font-size:11px;color:var(--muted)">Sultan Engine Admin v3 · Firebase: sultan-engine-v12-62455</div>
    </div>`;
}

function saveSettings(){
  const s={leadPrice:parseInt(document.getElementById('s_lead').value)||10,commission:parseInt(document.getElementById('s_comm').value)||10,upiId:document.getElementById('s_upi').value.trim(),referralBonus:parseInt(document.getElementById('s_ref').value)||20,maxLeadsPerDay:parseInt(document.getElementById('s_max').value)||5,nearbyRadius:parseInt(document.getElementById('s_rad').value)||2000};
  if(A.db)A.db.ref('/settings').update(s).then(()=>{T('✅ Settings saved!');audit('UPDATE_SETTINGS','Config updated');});else T('Firebase not connected');
}

function toggleSetting(key,val){
  if(!A.db)return;
  A.db.ref('/settings/'+key).set(val).then(()=>{T(key+': '+(val?'ON':'OFF'));renderSettings();});
}

function copyRules(){
  const rules=`{"rules":{"businesses":{".read":true,"$b":{".write":"auth != null"}},"leads":{".read":true,".write":true},"ratings":{".read":true,".write":true},"tracking":{".read":true,".write":true},"wallets":{".read":"auth != null",".write":"auth != null"},"settings":{".read":true,".write":"auth != null"},"complaints":{".read":"auth != null",".write":true},"bookings":{".read":"auth != null",".write":"auth != null"},"chats":{".read":"auth != null",".write":"auth != null"},"customers":{".read":"auth != null",".write":"auth != null"},"notifications":{".read":true,".write":"auth != null"},"auditLogs":{".read":"auth != null",".write":"auth != null"}}}`;
  navigator.clipboard?.writeText(rules).then(()=>T('✅ Rules copied!')).catch(()=>T('Copy failed — use manual copy'));
}

/* ── AUDIT ── */
function openAuditSheet(){
  const logs=Object.values(A.auditLogs||{}).sort((a,b)=>b.ts-a.ts).slice(0,60);
  const ic={APPROVE_BIZ:'✅',REJECT_BIZ:'❌',DELETE_BIZ:'🗑️',EDIT_BIZ:'✏️',ADD_BIZ:'➕',VERIFY:'🏅',UNVERIFY:'📛',BOOST:'⚡',UNBOOST:'💨',SUSPEND:'🚫',UNSUSPEND:'✅',WALLET_ADJUST:'💰',APPROVE_RECHARGE:'💳',RESOLVE:'⚠️',BK_STATUS:'📋',SEND_NOTIF:'🔔',CREATE_PROMO:'🎁',UPDATE_SETTINGS:'⚙️'};
  document.getElementById('auditSheetBody').innerHTML=`
    <div class="sheet-title">📋 Audit Log</div>
    ${logs.length?logs.map(l=>`
      <div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:34px;height:34px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${ic[l.action]||'📋'}</div>
        <div><div style="font-size:13px;font-weight:600;color:var(--ink)">${l.action}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4">${esc(l.detail||'')}</div><div style="font-size:10px;color:var(--muted);margin-top:3px">${new Date(l.ts||0).toLocaleString('en-IN')}</div></div>
      </div>`).join(''):`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No logs yet</div></div>`}`;
  openSheet('auditSheet');
}

initFB();
</script>
</body>
</html>
